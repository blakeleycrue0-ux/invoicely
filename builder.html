<html lang="es">
<head>

<title>Invoicely — Crear documento</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1729;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --bg:#f8f9fc;--white:#fff;--border:#e5e7eb;
  --accent:#4f46e5;--accent-2:#6366f1;--accent-light:#eef2ff;--accent-mid:#c7d2fe;
  --green:#16a34a;--green-bg:#dcfce7;--yellow:#d97706;--yellow-bg:#fef3c7;
  --red:#dc2626;--red-bg:#fee2e2;--sidebar:240px
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;overflow-y:auto}
.sb-logo{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon svg{width:16px;height:16px}
.sb-logo-text{font-family:'Instrument Serif',serif;font-size:1.15rem;font-style:italic;color:var(--ink)}
.sb-nav{flex:1;padding:10px}
.sb-lbl{font-size:0.6rem;font-weight:700;color:var(--ink-4);letter-spacing:0.1em;text-transform:uppercase;padding:0 10px;margin:14px 0 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:var(--ink-3);font-size:0.8rem;font-weight:500;margin-bottom:2px;transition:all 0.15s;text-decoration:none;cursor:pointer;border:none;background:none;width:100%;font-family:'Plus Jakarta Sans',sans-serif}
.sb-item:hover{background:var(--bg);color:var(--ink-2)}
.sb-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-back{padding:12px;border-top:1px solid var(--border)}
.sb-back a{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--ink-4);text-decoration:none;padding:8px 10px;border-radius:7px;transition:all 0.15s}
.sb-back a:hover{background:var(--bg);color:var(--ink)}
.sb-back svg{width:14px;height:14px;stroke:currentColor}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:0.88rem;font-weight:600;color:var(--ink);flex:1}
.tb-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:0.8rem;font-weight:600;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s}
.tb-btn.primary{background:var(--accent);color:white}
.tb-btn.primary:hover{background:var(--accent-2)}
.tb-btn.secondary{background:var(--white);color:var(--ink-2);border:1px solid var(--border)}
.tb-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn svg{width:13px;height:13px}

/* DOC TYPE BAR */
.type-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.type-btn{display:flex;align-items:center;gap:7px;padding:11px 14px;font-size:0.8rem;font-weight:500;color:var(--ink-4);cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;white-space:nowrap}
.type-btn:hover{color:var(--ink-2)}
.type-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.type-btn svg{width:14px;height:14px;stroke:currentColor}

/* LAYOUT */
.builder-layout{display:grid;grid-template-columns:380px 1fr;flex:1;min-height:0}

/* FORM PANEL */
.form-panel{background:var(--white);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 96px)}
.form-section{padding:18px 20px;border-bottom:1px solid var(--border)}
.form-section:last-child{border-bottom:none}
.fs-head{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.fs-icon{width:26px;height:26px;border-radius:6px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fs-icon svg{width:13px;height:13px;stroke:var(--accent)}
.fs-title{font-size:0.8rem;font-weight:700;color:var(--ink)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg{margin-bottom:10px}
.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:0.68rem;font-weight:600;color:var(--ink-3);margin-bottom:4px;letter-spacing:0.01em}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;transition:all 0.2s;outline:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent);background:var(--white)}
.fg textarea{resize:vertical;min-height:64px;line-height:1.5}
.fg input[type="file"]{padding:6px 11px;cursor:pointer;font-size:0.78rem}
.fg input[type="color"]{padding:3px;cursor:pointer;height:36px}

/* LOGO */
.logo-area{border:2px dashed var(--border);border-radius:9px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.logo-area:hover{border-color:var(--accent);background:var(--accent-light)}
.logo-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.logo-area-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.logo-area-icon svg{width:17px;height:17px;stroke:var(--accent)}
.logo-area-text{font-size:0.78rem;font-weight:600;color:var(--ink-3)}
.logo-area-sub{font-size:0.68rem;color:var(--ink-4);margin-top:2px}
.logo-preview{display:none;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:7px;border:1px solid var(--border)}
.logo-preview img{max-height:40px;max-width:100px;object-fit:contain}
.logo-preview button{background:none;border:none;color:var(--red);cursor:pointer;font-size:0.75rem;font-family:'Plus Jakarta Sans',sans-serif;padding:3px 7px;border-radius:4px;transition:all 0.15s}
.logo-preview button:hover{background:var(--red-bg)}

/* LOGO POS */
.logo-pos{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:7px}
.lp-btn{padding:7px;border-radius:5px;border:1.5px solid var(--border);background:var(--white);color:var(--ink-4);font-size:0.68rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;text-align:center}
.lp-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* BG SWATCHES */
.swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.sw{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.sw:hover{transform:scale(1.1)}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-mid)}

/* LINE ITEMS */
.line-mode{display:flex;background:var(--bg);border-radius:7px;padding:3px;margin-bottom:10px;gap:3px}
.lm-btn{flex:1;padding:6px;border-radius:5px;border:none;font-size:0.68rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;color:var(--ink-4);background:none}
.lm-btn.active{background:var(--white);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.line-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;transition:border-color 0.15s}
.line-item:hover{border-color:var(--accent-mid)}
.li-top{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px}
.li-desc{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;color:var(--ink);outline:none;transition:all 0.2s}
.li-desc:focus{border-color:var(--accent)}
.li-remove{background:none;border:none;color:var(--ink-4);cursor:pointer;padding:7px;border-radius:5px;transition:all 0.15s;flex-shrink:0}
.li-remove:hover{background:var(--red-bg);color:var(--red)}
.li-remove svg{width:13px;height:13px}
.li-nums{display:grid;gap:5px}
.li-nums.simple{grid-template-columns:1fr}
.li-nums.calc{grid-template-columns:1fr 1fr 1fr}
.num-input{background:var(--white);border:1.5px solid var(--border);border-radius:5px;padding:7px 10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;color:var(--ink);outline:none;transition:all 0.2s;width:100%}
.num-input:focus{border-color:var(--accent)}
.num-input.total-field{background:var(--accent-light);color:var(--accent);font-weight:700;cursor:default}
.num-lbl{font-size:0.6rem;color:var(--ink-4);margin-bottom:2px;font-weight:600}
.add-line{width:100%;padding:9px;border-radius:7px;border:2px dashed var(--border);background:none;color:var(--ink-4);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.add-line:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.add-line svg{width:13px;height:13px}

/* DOWNLOAD SECTION */
.dl-section{padding:18px 20px;background:var(--bg);border-top:1px solid var(--border);position:sticky;bottom:0}
.dl-btn{width:100%;padding:14px;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.dl-btn:hover{background:var(--accent-2);box-shadow:0 8px 24px rgba(79,70,229,0.35);transform:translateY(-1px)}
.dl-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.dl-btn svg{width:16px;height:16px}
.dl-note{font-size:0.68rem;color:var(--ink-4);text-align:center;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px}
.dl-note svg{width:11px;height:11px;stroke:var(--ink-4)}
.print-btn{width:100%;padding:10px;border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--ink-2);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:8px}
.print-btn:hover{border-color:var(--accent);color:var(--accent)}

/* PREVIEW PANEL */
.preview-panel{background:#e8e8e8;overflow-y:auto;max-height:calc(100vh - 96px)}
.preview-inner{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:28px}
.preview-doc{width:100%;max-width:660px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:9px;font-size:0.8rem;font-weight:500;z-index:9999;transform:translateY(80px);transition:transform 0.3s;box-shadow:0 8px 24px rgba(0,0,0,0.15);font-family:'Plus Jakarta Sans',sans-serif}
.toast.show{transform:translateY(0)}
.toast.success{background:var(--green);color:white}
.toast.error{background:var(--red);color:white}
.toast.info{background:var(--ink);color:white}

/* ═══ DOCUMENT DESIGNS ═══ */

/* INVOICE — Classic */
.doc-classic{font-family:'Plus Jakarta Sans',Arial,sans-serif;color:#1a1a1a;padding:48px;min-height:600px;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* QUOTE — Modern indigo header */
.doc-quote{font-family:'Plus Jakarta Sans',Arial,sans-serif;color:#0f1729;min-height:600px;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* RECEIPT — Green */
.doc-receipt{font-family:'Plus Jakarta Sans',Arial,sans-serif;color:#1a1a1a;min-height:400px;max-width:500px;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* PROFORMA — Amber */
.doc-proforma{font-family:'Plus Jakarta Sans',Arial,sans-serif;color:#1a1a1a;padding:48px;min-height:600px;-webkit-print-color-adjust:exact;print-color-adjust:exact}

@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0}
  .builder-layout{grid-template-columns:1fr}
  .preview-panel{display:none}
}
@media print{
  .sidebar,.topbar,.type-bar,.form-panel,.toast,.dl-section{display:none!important}
  .main{margin-left:0!important}
  .preview-panel{max-height:none!important;background:white!important;padding:0!important}
  .preview-inner{padding:0!important}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon"><svg fill="none" viewBox="0 0 120 120"><path d="M60 32 L26 88" stroke="white" stroke-opacity="0.5" stroke-width="18" stroke-linecap="round"/><path d="M60 32 L94 88" stroke="white" stroke-width="18" stroke-linecap="round"/></svg></div>
    <div class="sb-logo-text">Invoicely</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-lbl">Crear</div>
    <button class="sb-item active" id="sb-invoice" onclick="setType('invoice')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Factura
    </button>
    <button class="sb-item" id="sb-quote" onclick="setType('quote')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Presupuesto
    </button>
    <button class="sb-item" id="sb-receipt" onclick="setType('receipt')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>Recibo
    </button>
    <button class="sb-item" id="sb-proforma" onclick="setType('proforma')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/></svg>Proforma
    </button>
  </nav>
  <div class="sb-back">
    <a href="dashboard.html">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al inicio
    </a>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="docTitleBar">Nueva Factura</div>
    <button class="tb-btn secondary" onclick="window.print()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Imprimir
    </button>
    <button class="tb-btn primary" onclick="handleDownload()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Descargar PDF — €0,50
    </button>
  </div>

  <div class="type-bar">
    <button class="type-btn active" id="tb-invoice" onclick="setType('invoice')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Factura
    </button>
    <button class="type-btn" id="tb-quote" onclick="setType('quote')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Presupuesto
    </button>
    <button class="type-btn" id="tb-receipt" onclick="setType('receipt')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/></svg>Recibo
    </button>
    <button class="type-btn" id="tb-proforma" onclick="setType('proforma')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Proforma
    </button>
  </div>

  <div class="builder-layout">
    <div class="form-panel">

      <!-- TU EMPRESA -->
      <div class="form-section">
        <div class="fs-head">
          <div class="fs-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg></div>
          <div class="fs-title">Tu empresa</div>
        </div>
        <div class="fg">
          <label>Logo</label>
          <div class="logo-area" id="logoArea">
            <input type="file" id="logoInput" accept="image/*" onchange="handleLogo(this)">
            <div class="logo-area-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
            <div class="logo-area-text">Subir logo</div>
            <div class="logo-area-sub">PNG, JPG · Máx 2MB</div>
          </div>
          <div class="logo-preview" id="logoPreview">
            <img id="logoThumb" src="" alt="logo">
            <div style="flex:1"><div style="font-size:0.78rem;font-weight:600;color:var(--ink)">Logo subido</div><div style="font-size:0.68rem;color:var(--ink-4)">Aparece en el documento</div></div>
            <button onclick="removeLogo()">Eliminar</button>
          </div>
        </div>
        <div style="display:none" id="logoPosSection">
          <label style="display:block;font-size:0.68rem;font-weight:600;color:var(--ink-3);margin-bottom:4px">Posición del logo</label>
          <div class="logo-pos">
            <button class="lp-btn active" id="lp-left" onclick="setLogoPos('left')">◀ Izquierda</button>
            <button class="lp-btn" id="lp-center" onclick="setLogoPos('center')">● Centro</button>
            <button class="lp-btn" id="lp-right" onclick="setLogoPos('right')">Derecha ▶</button>
          </div>
        </div>
        <div class="fg" style="margin-top:10px"><label>Nombre de empresa</label><input type="text" id="bizName" placeholder="Tu Empresa S.L." oninput="updatePreview()"></div>
        <div class="form-row">
          <div class="fg"><label>Email</label><input type="email" id="bizEmail" placeholder="hola@empresa.com" oninput="updatePreview()"></div>
          <div class="fg"><label>Teléfono</label><input type="tel" id="bizPhone" placeholder="+34 600 000 000" oninput="updatePreview()"></div>
        </div>
        <div class="fg"><label>Dirección</label><textarea id="bizAddress" placeholder="Calle Mayor 1&#10;28001 Madrid, España" rows="2" oninput="updatePreview()"></textarea></div>
        <div class="fg"><label>NIF / CIF</label><input type="text" id="bizNif" placeholder="B-12345678" oninput="updatePreview()"></div>
      </div>

      <!-- CLIENTE (hidden for receipt) -->
      <div class="form-section" id="clientSection">
        <div class="fs-head">

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
var STRIPE_PK = 'pk_live_51TdnJEFB7wERNFpwMhdWeNLQxZpGIufy0lby2rVMNuCtcGeFAETwI12BpC0Df8Hrsz5fq18beYd9wggsTnnA6Eh200BfeAGDNJ';
var PRICE_ID  = 'price_1TnNcZFB7wERNFpwxdGz7AoR';

// ─── STATE ───
var docType = 'invoice';
var logoUrl = null;
var logoPos = 'left';
var lineMode = 'simple';
var bgKey = 'default';
var bgColors = {default:'#faf9f6',white:'#ffffff',cream:'#fffbf0',blue:'#f0f4ff',green:'#f0faf4',rose:'#fff1f2',dark:'#0f172a'};

// ─── INIT ───
(function(){
  var p = new URLSearchParams(window.location.search);
  var t = p.get('type') || 'invoice';
  setType(t);
  var today = new Date();
  var due   = new Date(); due.setDate(due.getDate()+14);
  var valid = new Date(); valid.setDate(valid.getDate()+30);
  var fmt = function(d){ return d.toISOString().split('T')[0]; };
  document.getElementById('docDate').value  = fmt(today);
  document.getElementById('dueDate').value  = fmt(due);
  document.getElementById('validDate').value = fmt(valid);
  var pfx = {invoice:'FAC-',quote:'PRE-',receipt:'REC-',proforma:'PRO-'};
  document.getElementById('docNumber').value = (pfx[t]||'FAC-') + (Math.floor(Math.random()*9000)+1000);
  updatePreview();

  // Check if returning from Stripe success
  if(p.get('paid') === 'true'){
    showToast('¡Pago confirmado! Generando PDF...','success');
    setTimeout(function(){ downloadPDF(); }, 1200);
  }
})();

// ─── TYPE ───
function setType(t){
  docType = t;
  ['invoice','quote','receipt','proforma'].forEach(function(x){
    document.getElementById('sb-'+x).classList.toggle('active', x===t);
    document.getElementById('tb-'+x).classList.toggle('active', x===t);
  });
  var isR = t==='receipt', isQ = t==='quote';
  document.getElementById('clientSection').style.display     = isR ? 'none' : '';
  document.getElementById('receiptSection').style.display    = isR ? '' : 'none';
  document.getElementById('docDetailsSection').style.display = isR ? 'none' : '';
  document.getElementById('lineSection').style.display       = isR ? 'none' : '';
  document.getElementById('extrasSection').style.display     = isR ? 'none' : '';
  document.getElementById('styleSection').style.display      = isR ? 'none' : '';
  document.getElementById('quoteIntroGroup').style.display   = isQ ? '' : 'none';
  document.getElementById('validGroup').style.display        = isQ ? '' : 'none';
  document.getElementById('dueDateGroup').style.display      = isQ ? 'none' : '';
  var titles = {invoice:'Detalles de la factura',quote:'Detalles del presupuesto',proforma:'Detalles de la proforma'};
  var el = document.getElementById('docDetailsTitle');
  if(el) el.textContent = titles[t] || '';
  var numLbls = {invoice:'Nº Factura',quote:'Nº Presupuesto',proforma:'Nº Proforma'};
  var nl = document.getElementById('docNumLabel');
  if(nl) nl.textContent = numLbls[t] || 'Número';
  var barTitles = {invoice:'Nueva Factura',quote:'Nuevo Presupuesto',receipt:'Nuevo Recibo',proforma:'Nueva Proforma'};
  document.getElementById('docTitleBar').textContent = barTitles[t];
  // Update doc number prefix
  var pfx = {invoice:'FAC-',quote:'PRE-',receipt:'REC-',proforma:'PRO-'};
  var cur = document.getElementById('docNumber').value;
  var allPfx = ['FAC-','PRE-','REC-','PRO-'];
  var hasPfx = allPfx.some(function(p){ return cur.startsWith(p); });
  if(hasPfx) document.getElementById('docNumber').value = (pfx[t]||'FAC-') + cur.slice(4);
  updatePreview();
}

// ─── LOGO ───
function handleLogo(input){
  var file = input.files[0]; if(!file) return;
  var r = new FileReader();
  r.onload = function(e){
    logoUrl = e.target.result;
    document.getElementById('logoThumb').src = logoUrl;
    document.getElementById('logoPreview').style.display = 'flex';
    document.getElementById('logoArea').style.display = 'none';
    document.getElementById('logoPosSection').style.display = 'block';
    updatePreview();
  };
  r.readAsDataURL(file);
}
function removeLogo(){
  logoUrl = null;
  document.getElementById('logoInput').value = '';
  document.getElementById('logoPreview').style.display = 'none';
  document.getElementById('logoArea').style.display = 'block';
  document.getElementById('logoPosSection').style.display = 'none';
  updatePreview();
}
function setLogoPos(p){
  logoPos = p;
  ['left','center','right'].forEach(function(x){ document.getElementById('lp-'+x).classList.toggle('active',x===p); });
  updatePreview();
}

// ─── BG ───
function setBg(key){
  bgKey = key;
  document.querySelectorAll('.sw').forEach(function(s){ s.classList.remove('active'); });
  var sw = document.querySelector('[data-bg="'+key+'"]');
  if(sw) sw.classList.add('active');
  updatePreview();
}
function getBg(){ return bgColors[bgKey] || '#faf9f6'; }
function isDark(bg){ var h=bg.replace('#',''),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16); return(r*.299+g*.587+b*.114)<128; }

// ─── LINE MODE ───
function setLineMode(m){
  lineMode = m;
  document.getElementById('modeSimple').classList.toggle('active', m==='simple');
  document.getElementById('modeCalc').classList.toggle('active', m==='calc');
  document.querySelectorAll('.li-nums').forEach(function(el){ el.className='li-nums '+m; });
  updatePreview();
}
function addLine(){
  var c = document.getElementById('lineItems');
  var d = document.createElement('div'); d.className='line-item';
  d.innerHTML = '<div class="li-top"><input type="text" class="li-desc" placeholder="Ej. Diseño de logotipo" oninput="updatePreview()"><button class="li-remove" onclick="removeLine(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'
    +'<div class="li-nums '+lineMode+'">'
    +(lineMode==='simple'
      ? '<div><div class="num-lbl">Precio</div><input type="text" class="num-input price-in" placeholder="800" oninput="updatePreview()"></div>'
      : '<div><div class="num-lbl">Cant.</div><input type="text" class="num-input qty-in" placeholder="2" oninput="calcLine(this)"></div><div><div class="num-lbl">Precio/u</div><input type="text" class="num-input rate-in" placeholder="400" oninput="calcLine(this)"></div><div><div class="num-lbl">Total</div><input type="text" class="num-input total-field" readonly placeholder="0.00"></div>')
    +'</div>';
  c.appendChild(d);
}
function calcLine(input){
  var item = input.closest('.line-item');
  var qty  = parseFloat(item.querySelector('.qty-in') ? item.querySelector('.qty-in').value : 0)||0;
  var rate = parseFloat(item.querySelector('.rate-in') ? item.querySelector('.rate-in').value : 0)||0;
  var t = item.querySelector('.total-field'); if(t) t.value=(qty*rate).toFixed(2);
  updatePreview();
}
function removeLine(btn){ btn.closest('.line-item').remove(); updatePreview(); }

// ─── COLLECT DATA ───
function val(id){ var el=document.getElementById(id); return el?el.value:''; }
function getCur(){ return val('currency')||'€'; }
function fmt(n){ return getCur()+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtDate(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}):'—'; }

function collectData(){
  var items=[],subtotal=0;
  document.querySelectorAll('#lineItems .line-item').forEach(function(item){
    var desc = item.querySelector('.li-desc') ? item.querySelector('.li-desc').value : '';
    var price = 0;
    if(lineMode==='simple'){
      var pi = item.querySelector('.price-in'); price = parseFloat(pi?pi.value:0)||0;
    } else {
      var qi=item.querySelector('.qty-in'),ri=item.querySelector('.rate-in');
      price = (parseFloat(qi?qi.value:0)||0)*(parseFloat(ri?ri.value:0)||0);
    }
    if(desc||price){ items.push({desc:desc,amount:price}); subtotal+=price; }
  });
  var tax   = parseFloat(val('taxRate'))||0;
  var dp    = parseFloat(val('discPct'))||0;
  var df    = parseFloat(val('discFixed'))||0;
  var disc  = subtotal*dp/100+df;
  var after = subtotal-disc;
  var taxAmt= after*tax/100;
  return {
    type:docType, bg:getBg(), dark:isDark(getBg()),
    logo:logoUrl, logoPos:logoPos,
    bizName:val('bizName')||'Tu Empresa',
    bizEmail:val('bizEmail'), bizPhone:val('bizPhone'),
    bizAddress:val('bizAddress'), bizNif:val('bizNif'),
    clientName:val('clientName')||'Cliente',
    clientEmail:val('clientEmail'), clientAddress:val('clientAddress'), clientNif:val('clientNif'),
    docNum:val('docNumber'), docDate:fmtDate(val('docDate')),
    dueDate:fmtDate(val('dueDate')), validDate:fmtDate(val('validDate')),
    quoteIntro:val('quoteIntro'),
    items:items, subtotal:subtotal, disc:disc, after:after, taxRate:tax, taxAmt:taxAmt, total:after+taxAmt,
    notes:val('notes'), bankDetails:val('bankDetails'), footer:val('footer'),
    recAmount:val('recAmount'), recFrom:val('recFrom'), recDesc:val('recDesc'),
    recMethod:val('recMethod')||'Transferencia bancaria',
    recNumber:val('recNumber'), recDate:val('recDate'),
    recCurrency:val('recCurrency')||'€',
    currency:getCur(), discPct:dp, discFixed:df
  };
}

// ─── LOGO HTML ───
function logoHtml(d){
  if(!d.logo) return '';
  var align = d.logoPos==='center'?'margin:0 auto 12px':d.logoPos==='right'?'margin-left:auto;margin-bottom:12px':'margin-bottom:12px';
  return '<img src="'+d.logo+'" style="max-height:60px;max-width:160px;object-fit:contain;display:block;'+align+'">';
}

// ─── RENDER INVOICE ───
function renderInvoice(d){
  var bg=d.bg,tc=d.dark?'#e8e0d0':'#1a1a1a',mc=d.dark?'#9a9080':'#777',bc=d.dark?'rgba(255,255,255,0.2)':'#1a1a1a',rb=d.dark?'rgba(255,255,255,0.08)':'#f0ece4';
  var F="font-family:'Plus Jakarta Sans',Arial,sans-serif";
  var FI="font-family:'Instrument Serif',Georgia,serif";
  var FM="font-family:'DM Mono',Courier,monospace";
  var statusColor = 'background:#fff3cd;color:#856404';
  var statusText = 'Pendiente';
  var rows = d.items.length ? d.items.map(function(i){
    return '<tr><td style="'+F+';padding:9px 0;font-size:0.84rem;color:'+tc+';border-bottom:1px solid '+rb+'">'+i.desc+'</td><td style="'+F+';padding:9px 0;font-size:0.84rem;color:'+tc+';border-bottom:1px solid '+rb+';text-align:right">'+fmt(i.amount)+'</td></tr>';
  }).join('') : '<tr><td colspan="2" style="padding:12px 0;color:#bbb;font-style:italic;font-size:0.8rem">Añade líneas en el formulario...</td></tr>';
  var disc = d.disc>0?'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.8rem;color:'+mc+';'+F+'"><span>Descuento</span><span>-'+fmt(d.disc)+'</span></div>':'';
  var tax  = d.taxRate>0?'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.8rem;color:'+mc+';'+F+'"><span>IVA ('+d.taxRate+'%)</span><span>'+fmt(d.taxAmt)+'</span></div>':'';
  var notes = d.notes?'<div style="margin-top:16px;padding:12px 16px;background:'+rb+';'+F+';font-size:0.76rem;color:'+mc+';line-height:1.6"><strong style="display:block;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:'+tc+';margin-bottom:3px;'+FM+'">Notas</strong>'+d.notes+'</div>':'';

// ─── UPDATE PREVIEW ───
function updatePreview(){
  var d = collectData();
  var el = document.getElementById('previewDoc');
  var panel = document.querySelector('.preview-panel');
  panel.style.background = (d.type==='quote') ? '#e0e0e0' : '#e8e8e8';
  if(d.type==='quote')       el.innerHTML = renderQuote(d);
  else if(d.type==='receipt') el.innerHTML = renderReceipt(d);
  else if(d.type==='proforma') el.innerHTML = renderProforma(d);
  else                         el.innerHTML = renderInvoice(d);
}

// ─── STRIPE PAYMENT ───

// ─── DOWNLOAD PDF ───
function downloadPDF(){
  var btn = document.getElementById('dlBtn');
  btn.disabled = true;
  btn.textContent = 'Generando PDF...';
  var d = collectData();
  var bg = d.type==='receipt' ? '#ffffff' : d.bg||'#faf9f6';
  var fname = (d.bizName||'Documento').replace(/[^a-zA-Z0-9]/g,'-')+'-'+d.docNum+'.pdf';
  var src = document.getElementById('previewDoc');
  html2pdf().set({
    margin:0,
    filename:fname,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:bg,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(src).save().then(function(){
    btn.disabled = false;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Descargar PDF — €0,50';
    showToast('¡PDF descargado!','success');
  }).catch(function(){
    btn.disabled = false;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Descargar PDF — €0,50';
    showToast('Error generando PDF. Prueba a imprimir.','error');
  });
}

// ─── TOAST ───
function showToast(msg,type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(type||'info');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

window.addEventListener('load', updatePreview);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicely — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f1729;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;--bg:#f8f9fc;--white:#fff;--border:#e5e7eb;--accent:#4f46e5;--accent-2:#6366f1;--accent-light:#eef2ff;--green:#16a34a;--red:#dc2626;--red-bg:#fee2e2}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 48px rgba(0,0,0,0.08)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:22px;height:22px}
.logo-text{font-family:'Instrument Serif',serif;font-size:1.5rem;font-style:italic;color:var(--ink)}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:28px;gap:3px}
.tab-btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--ink-4);background:none}
.tab-btn.active{background:var(--white);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.8rem;font-weight:600;color:var(--ink-3);margin-bottom:6px}
.form-group input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;color:var(--ink);outline:none;transition:all 0.2s}
.form-group input:focus{border-color:var(--accent);background:var(--white);box-shadow:0 0 0 3px rgba(79,70,229,0.08)}
.submit-btn{width:100%;background:var(--accent);color:white;border:none;padding:14px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:4px}
.submit-btn:hover{background:var(--accent-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,0.3)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink-4);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;background:var(--white);color:var(--ink-2);border:1.5px solid var(--border);padding:13px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.google-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.google-btn svg{width:18px;height:18px}
.msg{padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;display:none}
.msg.error{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;display:block}
.msg.success{background:#dcfce7;color:var(--green);border:1px solid #86efac;display:block}
.back-link{text-align:center;margin-top:20px;font-size:0.82rem;color:var(--ink-4)}
.back-link a{color:var(--accent);text-decoration:none;font-weight:600}
.back-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <div class="logo-text">Invoicely</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="msg" class="msg"></div>

  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div style="text-align:center;margin-top:12px"><a href="#" onclick="showReset()" style="font-size:0.8rem;color:var(--ink-4);text-decoration:none">Forgot password?</a></div>
  </div>

  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="signup-name" placeholder="Alex Morgan" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <button class="submit-btn" id="signup-btn" onclick="doSignup()">Create Account</button>
  </div>

  <div id="form-reset" style="display:none">
    <p style="font-size:0.85rem;color:var(--ink-3);margin-bottom:16px">Enter your email and we'll send you a reset link.</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="you@example.com">
    </div>
    <button class="submit-btn" onclick="doReset()">Send Reset Link</button>
    <div style="text-align:center;margin-top:12px"><a href="#" onclick="switchTab('login')" style="font-size:0.8rem;color:var(--ink-4);text-decoration:none">← Back to sign in</a></div>
  </div>

  <div class="divider" id="divider">or</div>
  <button class="google-btn" id="google-btn" onclick="doGoogle()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="back-link">← <a href="index.html">Back to home</a></div>
</div>

<script>
var SUPA_URL='https://keumnwqprtgwxvzvewtk.supabase.co';
var SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtldW1ud3FwcnRnd3h2enZld3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTI0NzQsImV4cCI6MjA5NjA2ODQ3NH0._GpKFMPpCB8_L993EqsWaWad2FGD1XAuugsxZYO4Y5I';

// Check if already logged in
var stored = localStorage.getItem('sb_session');
if(stored){
  try{
    var sess = JSON.parse(stored);
    if(sess && sess.access_token && sess.expires_at > Date.now()/1000){
      window.location.href='dashboard.html';
    }
  }catch(e){}
}

// Handle OAuth callback
var hash = window.location.hash;
if(hash && hash.includes('access_token')){
  var params = new URLSearchParams(hash.substring(1));
  var session = {
    access_token: params.get('access_token'),
    refresh_token: params.get('refresh_token'),
    expires_at: Date.now()/1000 + parseInt(params.get('expires_in')||3600)
  };
  // Get user info
  fetch(SUPA_URL+'/auth/v1/user',{
    headers:{'apikey':SUPA_ANON,'Authorization':'Bearer '+session.access_token}
  }).then(function(r){return r.json();}).then(function(u){
    session.user = u;
    localStorage.setItem('sb_session', JSON.stringify(session));
    window.location.href='dashboard.html';
  });
}

function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup').classList.toggle('active',tab==='signup');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('form-reset').style.display='none';
  document.getElementById('divider').style.display=tab==='reset'?'none':'flex';
  document.getElementById('google-btn').style.display=tab==='reset'?'none':'flex';
  clearMsg();
}

function showReset(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-reset').style.display='block';
  document.getElementById('divider').style.display='none';
  document.getElementById('google-btn').style.display='none';
  clearMsg();
}

function showMsg(msg,type){
  var el=document.getElementById('msg');
  el.textContent=msg;
  el.className='msg '+(type||'error');
}
function clearMsg(){document.getElementById('msg').className='msg';document.getElementById('msg').textContent='';}

function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var password=document.getElementById('login-password').value;
  if(!email||!password){showMsg('Please enter your email and password.');return;}
  var btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Signing in...';
  fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SUPA_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:password})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error||data.error_description){
      showMsg(data.error_description||data.error||'Login failed. Check your email and password.');
      btn.disabled=false;btn.textContent='Sign In';
    } else {
      data.expires_at=Date.now()/1000+(data.expires_in||3600);
      localStorage.setItem('sb_session',JSON.stringify(data));
      window.location.href='dashboard.html';
    }
  }).catch(function(){
    showMsg('Network error. Please try again.');
    btn.disabled=false;btn.textContent='Sign In';
  });
}

function doSignup(){
  var name=document.getElementById('signup-name').value.trim();
  var email=document.getElementById('signup-email').value.trim();
  var password=document.getElementById('signup-password').value;
  if(!email||!password){showMsg('Please fill in all fields.');return;}
  if(password.length<6){showMsg('Password must be at least 6 characters.');return;}
  var btn=document.getElementById('signup-btn');btn.disabled=true;btn.textContent='Creating account...';
  fetch(SUPA_URL+'/auth/v1/signup',{
    method:'POST',
    headers:{'apikey':SUPA_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:password,data:{full_name:name}})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error||data.error_description){
      showMsg(data.error_description||data.error||'Signup failed. Try again.');
      btn.disabled=false;btn.textContent='Create Account';
    } else if(data.user&&data.user.identities&&data.user.identities.length===0){
      showMsg('An account with this email already exists. Please sign in.');
      btn.disabled=false;btn.textContent='Create Account';
    } else if(data.session){
      data.session.expires_at=Date.now()/1000+(data.session.expires_in||3600);
      localStorage.setItem('sb_session',JSON.stringify(data.session));
      window.location.href='dashboard.html';
    } else {
      showMsg('Check your email to confirm your account, then sign in!','success');
      btn.disabled=false;btn.textContent='Create Account';
    }
  }).catch(function(){
    showMsg('Network error. Please try again.');
    btn.disabled=false;btn.textContent='Create Account';
  });
}

function doReset(){
  var email=document.getElementById('reset-email').value.trim();
  if(!email){showMsg('Enter your email address.');return;}
  fetch(SUPA_URL+'/auth/v1/recover',{
    method:'POST',
    headers:{'apikey':SUPA_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:email})
  }).then(function(){
    showMsg('Reset link sent! Check your email.','success');
  }).catch(function(){showMsg('Error sending reset email.');});
}

function doGoogle(){
  window.location.href=SUPA_URL+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent(window.location.origin+'/login.html');
}
</script>
</body>
</html>

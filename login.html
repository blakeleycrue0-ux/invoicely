<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicely — Sign In</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f1729;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;--bg:#f8f9fc;--white:#fff;--border:#e5e7eb;--accent:#4f46e5;--accent-2:#6366f1;--accent-light:#eef2ff;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 48px rgba(0,0,0,0.08);text-align:center}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:22px;height:22px}
.logo-text{font-family:'Instrument Serif',serif;font-size:1.5rem;font-style:italic;color:var(--ink)}
.title{font-family:'Instrument Serif',serif;font-size:1.8rem;color:var(--ink);margin-bottom:8px}
.sub{font-size:0.88rem;color:var(--ink-4);margin-bottom:32px;line-height:1.6}
.login-btn{background:var(--accent);color:white;border:none;padding:14px 32px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%}
.login-btn:hover{background:var(--accent-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,0.3)}
.back{margin-top:20px;font-size:0.82rem;color:var(--ink-4)}
.back a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <div class="logo-text">Invoicely</div>
  </div>
  <h1 class="title">Welcome back</h1>
  <p class="sub">Sign in to access your invoices, quotes and dashboard.</p>
  <button class="login-btn" onclick="window.netlifyIdentity.open()">Sign In / Create Account</button>
  <div class="back">← <a href="index.html">Back to home</a></div>
</div>
<script>
if(window.netlifyIdentity){
  window.netlifyIdentity.on('init', function(user){
    if(user) window.location.href='dashboard.html';
  });
  window.netlifyIdentity.on('login', function(){
    window.location.href='dashboard.html';
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABAklEQVR4nMWXzQ3CMAyFnYgpyj70SDeq2Kgcyz50DTiApWDSxD+p845R4T1/sas6QEbXy/OVO7fq/jgHevZzcJRxKUj0Nqde0duchoi1B49W6FF9KhOBZR1u1gAn6x8kIeZp3PwCfI1n7e9RTZtwWQefAAl2cw80H0MpBXGATOebKJgJTOP214gSCqIAe3OvGT9VgIzx7hhyKTRrQi0FdoAWr11TAKoSfhTnGlgBuNVrrkFFgFM9qkahGkB691IKYgKS6lElCsUA2s6XUBAR0FSP2qNQ/CBJDTW9wBlD9heRtvradQSAPnsBwGdD6r4XREzibYyekR54mgOQ7RjluZ6/AS7/ZEyHlfg8AAAAAElFTkSuQmCC">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicely — Sign In</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f1729;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;--bg:#f8f9fc;--white:#fff;--border:#e5e7eb;--accent:#4f46e5;--accent-2:#6366f1;--accent-light:#eef2ff;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#eef2ff 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#f0fdf4 0%,transparent 60%);z-index:0;pointer-events:none;}
.card{position:relative;z-index:1;background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 4px 6px rgba(0,0,0,0.04),0 20px 60px rgba(0,0,0,0.08);text-align:center;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:36px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(79,70,229,0.3);}
.logo-icon svg{width:22px;height:22px}
.logo-text{font-family:'Instrument Serif',serif;font-size:1.5rem;font-style:italic;color:var(--ink)}
.title{font-family:'Instrument Serif',serif;font-size:1.8rem;color:var(--ink);margin-bottom:8px}
.sub{font-size:0.88rem;color:var(--ink-4);margin-bottom:28px;line-height:1.6}
.features{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;text-align:left;}
.feature{display:flex;align-items:center;gap:10px;font-size:0.82rem;color:var(--ink-3);}
.feature-icon{width:28px;height:28px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.feature-icon svg{width:14px;height:14px;stroke:var(--accent)}
.btn-main{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;border:none;border-radius:12px;background:var(--accent);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;color:white;cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
.btn-main:hover{background:var(--accent-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,0.3);}
.btn-main svg{width:20px;height:20px;flex-shrink:0}
.trust{font-size:0.75rem;color:var(--ink-4);display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
.trust svg{width:13px;height:13px;stroke:var(--ink-4)}
.back{margin-top:20px;font-size:0.82rem;color:var(--ink-4)}
.back a{color:var(--accent);text-decoration:none;font-weight:600}
.back a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" viewBox="0 0 120 120" aria-hidden="true"><path d="M60 32 L26 88" stroke="white" stroke-opacity="0.5" stroke-width="18" stroke-linecap="round"/><path d="M60 32 L94 88" stroke="white" stroke-width="18" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-text">Invoicely</div>
  </div>
  <h1 class="title">Welcome back</h1>
  <p class="sub">Sign in to access your invoices, quotes and dashboard.</p>
  <div class="features">
    <div class="feature">
      <div class="feature-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      Create invoices, quotes &amp; receipts
    </div>
    <div class="feature">
      <div class="feature-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      Track revenue &amp; analytics
    </div>
    <div class="feature">
      <div class="feature-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      Download as PDF instantly
    </div>
  </div>
  <button class="btn-main" onclick="window.netlifyIdentity.open()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Sign In / Create Account
  </button>
  <div class="trust">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Secure login · Free to start · No credit card needed
  </div>
  <div class="back">← <a href="index.html">Back to home</a></div>
</div>
<script>
if(window.netlifyIdentity){
  window.netlifyIdentity.on('init',function(user){if(user) window.location.href='dashboard.html';});
  window.netlifyIdentity.on('login',function(){window.location.href='dashboard.html';});
}
</script>
</body>
</html>

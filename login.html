<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicely — Sign In</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f1729;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;--bg:#f8f9fc;--white:#fff;--border:#e5e7eb;--accent:#4f46e5;--accent-2:#6366f1;--accent-light:#eef2ff;--accent-mid:#c7d2fe}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
.page::before{content:'';position:absolute;width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(79,70,229,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:glow 5s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,0.08)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px}
.logo-text{font-family:'Instrument Serif',serif;font-size:1.3rem;font-style:italic;color:var(--ink)}
h1{font-family:'Instrument Serif',serif;font-size:1.6rem;font-weight:400;color:var(--ink);margin-bottom:6px}
.subtitle{font-size:0.85rem;color:var(--ink-3);margin-bottom:32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent);background:var(--white)}
.btn-submit{width:100%;background:var(--accent);color:white;border:none;padding:14px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s}
.btn-submit:hover{background:var(--accent-2);box-shadow:0 8px 24px rgba(79,70,229,0.35)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink-4);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;background:var(--white);color:var(--ink-2);border:1.5px solid var(--border);padding:12px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s}
.btn-google:hover{border-color:var(--accent);color:var(--accent)}
.toggle{text-align:center;margin-top:24px;font-size:0.82rem;color:var(--ink-3)}
.toggle a{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none}
.toggle a:hover{text-decoration:underline}
.error{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:16px;display:none}
.success{background:#dcfce7;color:#16a34a;padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:16px;display:none}
nav{background:transparent;padding:20px 32px;display:flex;align-items:center}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--ink-3);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
.nav-back:hover{color:var(--ink)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Invoicely
  </a>
</nav>
<div class="page">
  <div class="card">
    <a href="index.html" class="logo">
      <div class="logo-icon"><svg fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <span class="logo-text">Invoicely</span>
    </a>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <h1 id="formTitle">Welcome back</h1>
    <p class="subtitle" id="formSubtitle">Sign in to your account</p>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field" id="passwordField">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
    </div>
    <div class="field" id="confirmField" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Sign In</button>

    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="toggle" id="toggleText">
      Don't have an account? <a onclick="toggleMode()">Sign up free</a>
    </div>
  </div>
</div>

<script>
var isSignUp = new URLSearchParams(window.location.search).get('signup') === 'true';
if(isSignUp) toggleMode();

function toggleMode(){
  isSignUp = !isSignUp;
  document.getElementById('formTitle').textContent = isSignUp ? 'Create your account' : 'Welcome back';
  document.getElementById('formSubtitle').textContent = isSignUp ? 'Free forever — start invoicing today' : 'Sign in to your account';
  document.getElementById('submitBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('confirmField').style.display = isSignUp ? 'block' : 'none';
  document.getElementById('toggleText').innerHTML = isSignUp ? 'Already have an account? <a onclick="toggleMode()">Sign in</a>' : 'Don\'t have an account? <a onclick="toggleMode()">Sign up free</a>';
}

function showError(msg){ var e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('successMsg').style.display='none'; }
function showSuccess(msg){ var s=document.getElementById('successMsg'); s.textContent=msg; s.style.display='block'; document.getElementById('errorMsg').style.display='none'; }

function handleSubmit(){
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if(!email||!password){ showError('Please fill in all fields'); return; }
  if(isSignUp){
    var confirm = document.getElementById('confirmPassword').value;
    if(password!==confirm){ showError('Passwords do not match'); return; }
    if(password.length<6){ showError('Password must be at least 6 characters'); return; }
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Please wait...';
  var identity = window.netlifyIdentity;
  if(!identity){ showError('Identity service not available'); btn.disabled=false; btn.textContent=isSignUp?'Create Account':'Sign In'; return; }
  if(isSignUp){
    identity.signup(email,password,{}).then(function(){
      showSuccess('Account created! Check your email to confirm.');
      btn.disabled=false; btn.textContent='Create Account';
    }).catch(function(e){ showError(e.message||'Sign up failed'); btn.disabled=false; btn.textContent='Create Account'; });
  } else {
    identity.login(email,password).then(function(){
      window.location.href='dashboard.html';
    }).catch(function(e){ showError('Invalid email or password'); btn.disabled=false; btn.textContent='Sign In'; });
  }
}

function handleGoogle(){
  if(window.netlifyIdentity) window.netlifyIdentity.open('login');
}

document.addEventListener('keydown',function(e){ if(e.key==='Enter') handleSubmit(); });

if(window.netlifyIdentity){
  window.netlifyIdentity.on('login',function(){ window.location.href='dashboard.html'; });
  window.netlifyIdentity.on('init',function(user){ if(user) window.location.href='dashboard.html'; });
}
</script>
</body>
</html>

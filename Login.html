<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoicely — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 40px rgba(0,0,0,0.10); }
.logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
.logo-icon { width: 32px; height: 32px; background: #4f46e5; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 17px; height: 17px; }
.logo-text { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.25rem; color: #111; }
.tabs { display: flex; background: #f4f5f9; border-radius: 8px; padding: 3px; margin-bottom: 24px; }
.tab { flex: 1; padding: 8px; border: none; background: none; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.82rem; font-weight: 600; color: #aaa; cursor: pointer; transition: all .15s; }
.tab.active { background: #fff; color: #111; box-shadow: 0 1px 3px rgba(0,0,0,.09); }
h2 { font-size: 1.3rem; font-weight: 700; color: #111; margin-bottom: 4px; }
p { font-size: 0.82rem; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
label { display: block; font-size: 0.68rem; font-weight: 700; color: #333; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
input { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.88rem; color: #111; outline: none; margin-bottom: 12px; }
input:focus { border-color: #4f46e5; }
.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #4f46e5; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.msg { display: none; padding: 9px 13px; border-radius: 7px; font-size: 0.8rem; font-weight: 500; margin-bottom: 14px; }
.msg.red { background: #fee2e2; color: #dc2626; }
.msg.green { background: #dcfce7; color: #16a34a; }
.foot { text-align: center; margin-top: 14px; font-size: 0.78rem; color: #aaa; }
.foot a { color: #4f46e5; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" viewBox="0 0 120 120">
        <path d="M60 32L26 88" stroke="white" stroke-opacity=".5" stroke-width="18" stroke-linecap="round"/>
        <path d="M60 32L94 88" stroke="white" stroke-width="18" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-text">Invoicely</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login',this)">Entrar</button>
    <button class="tab" onclick="showTab('register',this)">Crear cuenta</button>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <h2>Bienvenido</h2>
    <p>Entra para gestionar tus facturas.</p>
    <div class="msg" id="lmsg"></div>
    <label>Email</label>
    <input type="email" id="lemail" placeholder="tu@email.com">
    <label>Contraseña</label>
    <input type="password" id="lpass" placeholder="Tu contraseña">
    <button class="btn" id="lbtn" onclick="doLogin()">Entrar</button>
    <div class="foot"><a href="#" onclick="showTab('forgot');return false">¿Olvidaste tu contraseña?</a></div>
  </div>

  <!-- REGISTER -->
  <div id="register" style="display:none">
    <h2>Crea tu cuenta</h2>
    <p>Gratis para siempre. Sin tarjeta de crédito.</p>
    <div class="msg" id="rmsg"></div>
    <label>Nombre</label>
    <input type="text" id="rname" placeholder="Tu nombre">
    <label>Email</label>
    <input type="email" id="remail" placeholder="tu@email.com">
    <label>Contraseña</label>
    <input type="password" id="rpass" placeholder="Mínimo 6 caracteres">
    <button class="btn" id="rbtn" onclick="doRegister()">Crear cuenta gratis</button>
  </div>

  <!-- FORGOT -->
  <div id="forgot" style="display:none">
    <h2>Recuperar contraseña</h2>
    <p>Te enviamos un enlace a tu email.</p>
    <div class="msg" id="fmsg"></div>
    <label>Email</label>
    <input type="email" id="femail" placeholder="tu@email.com">
    <button class="btn" id="fbtn" onclick="doForgot()">Enviar enlace</button>
    <div class="foot"><a href="#" onclick="showTab('login');return false">← Volver</a></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var client = window.supabase.createClient(
  'https://ihrloxoilbutrraddynw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlocmxveG9pbGJ1dHJyYWRkeW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTA1MzIsImV4cCI6MjA5ODMyNjUzMn0.Br0ht6CwfJEwmakTc9_qL9B0uauBrBq5b9cLrLVx3js'
);

// Check existing session - no errors shown
client.auth.getSession().then(function(res) {
  if (res && res.data && res.data.session) {
    window.location.href = 'onboarding.html';
  }
});

function showTab(id, btn) {
  ['login','register','forgot'].forEach(function(t){ document.getElementById(t).style.display = 'none'; });
  document.getElementById(id).style.display = '';
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  if (btn) btn.classList.add('active');
}

function setMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text || '';
  el.className = 'msg' + (text ? (' ' + (type || 'red')) : '');
  el.style.display = text ? 'block' : 'none';
}

function errText(e) {
  if (!e) return 'Error. Inténtalo de nuevo.';
  if (typeof e === 'string') return e;
  if (e.message) return e.message;
  return 'Error. Inténtalo de nuevo.';
}

function doLogin() {
  var email = document.getElementById('lemail').value.trim();
  var pass  = document.getElementById('lpass').value;
  setMsg('lmsg', '');
  if (!email || !pass) { setMsg('lmsg', 'Rellena todos los campos.'); return; }
  var btn = document.getElementById('lbtn');
  btn.disabled = true; btn.textContent = 'Entrando...';
  client.auth.signInWithPassword({ email: email, password: pass })
    .then(function(res) {
      btn.disabled = false; btn.textContent = 'Entrar';
      if (res.error) { setMsg('lmsg', errText(res.error)); return; }
      window.location.href = 'dashboard.html';
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = 'Entrar';
      setMsg('lmsg', errText(e));
    });
}

function doRegister() {
  var name  = document.getElementById('rname').value.trim();
  var email = document.getElementById('remail').value.trim();
  var pass  = document.getElementById('rpass').value;
  setMsg('rmsg', '');
  if (!name || !email || !pass) { setMsg('rmsg', 'Rellena todos los campos.'); return; }
  if (pass.length < 6) { setMsg('rmsg', 'La contraseña debe tener al menos 6 caracteres.'); return; }
  var btn = document.getElementById('rbtn');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  client.auth.signUp({ email: email, password: pass, options: { data: { full_name: name } } })
    .then(function(res) {
      btn.disabled = false; btn.textContent = 'Crear cuenta gratis';
      if (res.error) { setMsg('rmsg', errText(res.error)); return; }
      window.location.href = 'onboarding.html';
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = 'Crear cuenta gratis';
      setMsg('rmsg', errText(e));
    });
}

function doForgot() {
  var email = document.getElementById('femail').value.trim();
  setMsg('fmsg', '');
  if (!email) { setMsg('fmsg', 'Introduce tu email.'); return; }
  var btn = document.getElementById('fbtn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  client.auth.resetPasswordForEmail(email)
    .then(function(res) {
      btn.disabled = false; btn.textContent = 'Enviar enlace';
      if (res.error) { setMsg('fmsg', errText(res.error)); return; }
      setMsg('fmsg', 'Enlace enviado. Revisa tu email.', 'green');
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = 'Enviar enlace';
      setMsg('fmsg', errText(e));
    });
}
</script>
</body>
</html>
